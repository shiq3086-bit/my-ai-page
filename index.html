<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sq's Digital Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .bg-dark-blue { background-color: #1e3a8a; }
        .text-dark-blue { color: #1e3a8a; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- 顶部导航/个人信息 -->
    <header class="bg-dark-blue text-white py-12 px-6">
        <div class="max-auto max-w-2xl flex flex-col items-center">
            <!-- 占位头像 -->
            <div class="w-24 h-24 bg-blue-200 rounded-full mb-4 border-4 border-white/20 flex items-center justify-center text-3xl shadow-lg">
                👤
            </div>
            <h1 class="text-2xl font-bold tracking-tight">sq</h1>
            <p class="mt-2 text-blue-100 opacity-90 text-center">
                大一法学生，来自中国
            </p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-6 -mt-8">
        
        <!-- 个人展示区 -->
        <section class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <div class="space-y-4">
                <div>
                    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">当前状态</h2>
                    <p class="mt-1 font-medium">研究 AI，将其运用到生活与学习中，追求效率工具化。</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">兴趣点</h2>
                        <p class="mt-1">草坪、阳光、白云的倾斜瞬间</p>
                    </div>
                    <div>
                        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">个人特质</h2>
                        <p class="mt-1">身材较高，性格趋于成熟</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 数字分身聊天区 -->
        <section class="bg-white rounded-2xl shadow-md overflow-hidden border border-blue-100 flex flex-col h-[450px]">
            <!-- 聊天头部 -->
            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                <span class="text-dark-blue font-bold flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    数字分身 sq-Bot
                </span>
                <span class="text-xs text-slate-400">正在运行</span>
            </div>

            <!-- 消息展示区 -->
            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/50 text-sm">
                <div class="flex items-start">
                    <div class="bg-white p-3 rounded-lg rounded-tl-none shadow-sm border border-slate-100 max-w-[85%]">
                        你好，我是 sq 的数字分身。在这里你可以问我关于他的学业、对政治学的看法，或者他名字的由来。
                    </div>
                </div>
            </div>

            <!-- 预设问题快速点击 -->
            <div class="p-3 bg-white border-t border-slate-100 flex flex-wrap gap-2">
                <button onclick="ask('为什么叫这个名字？')" class="text-xs border border-blue-200 text-blue-600 px-2 py-1 rounded-full hover:bg-blue-50">名字含义？</button>
                <button onclick="ask('你对最近的某件事怎么看？')" class="text-xs border border-blue-200 text-blue-600 px-2 py-1 rounded-full hover:bg-blue-50">观点评价</button>
                <button onclick="ask('有什么与众不同的爱好？')" class="text-xs border border-blue-200 text-blue-600 px-2 py-1 rounded-full hover:bg-blue-50">小众爱好</button>
            </div>

            <!-- 输入框 -->
            <div class="p-4 bg-white flex gap-2">
                <input type="text" id="user-input" placeholder="输入问题..." class="flex-1 bg-slate-100 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="sendMessage()" class="bg-dark-blue text-white px-4 py-2 rounded-lg text-sm font-medium">发送</button>
            </div>
        </section>

    </main>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            if (input.value.trim() === '') return;
            renderMsg(input.value, 'user');
            // 这里后续可以对接 AI 接口
            setTimeout(() => {
                renderMsg("这是 sq-Bot 的自动回复演示。目前我还在学习如何更好地回答关于‘" + input.value + "’的问题。", 'bot');
            }, 500);
            input.value = '';
        }

        function ask(text) {
            document.getElementById('user-input').value = text;
            sendMessage();
        }

        function renderMsg(text, role) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end' : 'flex items-start';
            
            const content = role === 'user' 
                ? `<div class="bg-dark-blue text-white p-3 rounded-lg rounded-tr-none max-w-[85%] shadow-sm">${text}</div>`
                : `<div class="bg-white p-3 rounded-lg rounded-tl-none shadow-sm border border-slate-100 max-w-[85%]">${text}</div>`;
            
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
