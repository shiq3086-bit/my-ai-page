<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的数字分身</title>
    <style>
        /* 这里的样式为了让你的页面看起来更清爽 */
        body { background-color: #001f3f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 500px; height: 400px; border: 1px solid #0074D9; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .message { margin: 10px 0; padding: 8px 12px; border-radius: 15px; max-width: 80% }
        .user-message { background-color: #0074D9; align-self: flex-end; margin-left: auto; }
        .bot-message { background-color: #3D9970; align-self: flex-start; }
        #input-area { display: flex; width: 100%; max-width: 500px; }
        input { flex: 1; padding: 10px; border-radius: 4px 0 0 4px; border: none; }
        button { padding: 10px 20px; background-color: #0074D9; color: white; border: none; border-radius: 0 4px 4px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h1>数字分身</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入你想说的话...">
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const question = input.value.trim();
            if (!question) return;

            renderMsg(question, 'user');
            input.value = '';

            try {
                // 【注意】请务必把下面引号里的网址，换成你从 Cloudflare 拿到的 .workers.dev 网址
                const response = await fetch('https://plain-haze-a297.shiq3086.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await response.json();
                if (data.answer) {
                    renderMsg(data.answer, 'bot');
                } else {
                    renderMsg('连接成功，但大脑没给回复。', 'bot');
                }
            } catch (err) {
                renderMsg('连接失败，请确认 Worker 已部署且网址填入正确。', 'bot');
            }
        }

        function renderMsg(text, role) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
